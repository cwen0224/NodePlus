<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>節點編輯器 MVP</title>
  <link rel="stylesheet" href="./styles.css?v=20260324-4" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <button id="undo-btn" type="button">上一步</button>
        <button id="redo-btn" type="button">下一步</button>
        <button id="git-sync-btn" type="button">Git 同步</button>
        <span id="git-sync-status" class="git-sync-status" aria-live="polite">Git: off</span>
        <div id="defined-node-menu" class="defined-node-menu">
          <button id="defined-node-menu-btn" type="button" aria-expanded="false" aria-controls="defined-node-panel">
            已定義節點
          </button>
          <section id="defined-node-panel" class="defined-node-panel" aria-hidden="true">
            <header class="defined-node-panel-header">
              <h2>類型列表</h2>
              <span id="defined-node-count">0 類</span>
            </header>
            <div id="defined-node-list" class="defined-node-list"></div>
          </section>
        </div>
      </header>
      <button id="help-fab" class="help-fab" type="button" aria-label="開啟快捷鍵編輯">⚙</button>
      <section id="shortcut-panel" class="shortcut-panel" aria-hidden="true">
        <div class="shortcut-card" role="dialog" aria-modal="true" aria-labelledby="shortcut-title">
          <header class="shortcut-header">
            <h2 id="shortcut-title">快捷鍵編輯</h2>
            <button id="shortcut-close-btn" class="shortcut-close-btn" type="button" aria-label="關閉快捷鍵編輯">
              ×
            </button>
          </header>
          <p class="shortcut-editor-hint">點「變更」後按下想綁定的按鍵組合。按「清除」可移除綁定。</p>
          <div id="shortcut-editor-list" class="shortcut-editor-list"></div>
          <footer class="shortcut-editor-footer">
            <button id="shortcut-reset-btn" type="button">重設預設</button>
          </footer>
        </div>
      </section>
      <section id="git-sync-panel" class="git-sync-panel" aria-hidden="true">
        <div class="git-sync-card" role="dialog" aria-modal="true" aria-labelledby="git-sync-title">
          <header class="git-sync-header">
            <div>
              <h2 id="git-sync-title">Git 同步設定</h2>
              <p class="git-sync-hint">
                需要具備 `Contents: write` 權限的 GitHub Token。Token 只會存放在這台瀏覽器。
              </p>
            </div>
            <button id="git-sync-close-btn" class="git-sync-close-btn" type="button" aria-label="關閉 Git 同步設定">
              ×
            </button>
          </header>
          <div class="git-sync-fields">
            <label for="git-sync-owner-input">Owner</label>
            <input id="git-sync-owner-input" type="text" spellcheck="false" autocomplete="off" />
            <label for="git-sync-repo-input">Repository</label>
            <input id="git-sync-repo-input" type="text" spellcheck="false" autocomplete="off" />
            <label for="git-sync-branch-input">Branch</label>
            <input id="git-sync-branch-input" type="text" spellcheck="false" autocomplete="off" />
            <label for="git-sync-path-input">File path</label>
            <input id="git-sync-path-input" type="text" spellcheck="false" autocomplete="off" />
            <label for="git-sync-token-input">GitHub Token</label>
            <input id="git-sync-token-input" type="password" spellcheck="false" autocomplete="off" />
            <label for="git-sync-autosync-checkbox" class="git-sync-checkbox-row">
              <input id="git-sync-autosync-checkbox" type="checkbox" />
              <span>自動同步</span>
            </label>
            <label for="git-sync-startup-checkbox" class="git-sync-checkbox-row">
              <input id="git-sync-startup-checkbox" type="checkbox" />
              <span>啟動時從 Git 載入</span>
            </label>
          </div>
          <div id="git-sync-message" class="git-sync-message" aria-live="polite"></div>
          <footer class="git-sync-footer">
            <button id="git-sync-load-btn" type="button">從 Git 載入</button>
            <button id="git-sync-now-btn" type="button">立即同步</button>
            <button id="git-sync-save-btn" type="button">儲存設定</button>
            <button id="git-sync-clear-btn" type="button">清除 Token</button>
            <button id="git-sync-close-footer-btn" type="button">關閉</button>
          </footer>
        </div>
      </section>
      <section id="json-editor-panel" class="json-editor-panel" aria-hidden="true">
        <div class="json-editor-card" role="dialog" aria-modal="true" aria-labelledby="json-editor-title">
          <header class="json-editor-header">
            <h2 id="json-editor-title">媒體 JSON 編輯</h2>
            <button id="json-editor-close-btn" class="json-editor-close-btn" type="button" aria-label="關閉 JSON 編輯">
              ×
            </button>
          </header>
          <textarea id="json-editor-textarea" spellcheck="false"></textarea>
          <div id="json-editor-functional-controls" class="json-editor-functional-controls" hidden></div>
          <footer class="json-editor-footer">
            <button id="json-editor-cancel-btn" type="button">取消</button>
            <button id="json-editor-save-btn" type="button">儲存</button>
          </footer>
        </div>
      </section>
      <section id="node-text-editor-panel" class="node-text-editor-panel" aria-hidden="true">
        <div class="node-text-editor-card" role="dialog" aria-modal="true" aria-labelledby="node-text-editor-title">
          <header class="node-text-editor-header">
            <h2 id="node-text-editor-title">節點文字編輯</h2>
            <button
              id="node-text-editor-close-btn"
              class="node-text-editor-close-btn"
              type="button"
              aria-label="關閉節點文字編輯"
            >
              ×
            </button>
          </header>
          <div class="node-text-editor-fields">
            <label for="node-text-editor-title-input">標題</label>
            <input id="node-text-editor-title-input" type="text" spellcheck="false" />
            <label for="node-text-editor-content-textarea">內容</label>
            <textarea id="node-text-editor-content-textarea" spellcheck="false"></textarea>
          </div>
          <footer class="node-text-editor-footer">
            <div class="node-text-editor-footer-left">
              <button id="node-text-editor-edit-json-btn" type="button">編輯JSON</button>
              <button id="node-text-editor-define-json-btn" type="button">定義JSON</button>
            </div>
            <div class="node-text-editor-footer-right">
              <button id="node-text-editor-cancel-btn" type="button">取消</button>
              <button id="node-text-editor-save-btn" type="button">儲存</button>
            </div>
          </footer>
        </div>
      </section>
      <section id="media-viewer-panel" class="media-viewer-panel" aria-hidden="true">
        <div class="media-viewer-card" role="dialog" aria-modal="true" aria-labelledby="media-viewer-title">
          <header class="media-viewer-header">
            <h2 id="media-viewer-title">媒體預覽</h2>
            <button id="media-viewer-close-btn" class="media-viewer-close-btn" type="button" aria-label="關閉媒體預覽">
              ×
            </button>
          </header>
          <div id="media-viewer-meta" class="media-viewer-meta"></div>
          <div id="media-viewer-body" class="media-viewer-body">
            <p class="media-viewer-empty">請點擊節點中的媒體縮圖以預覽。</p>
          </div>
        </div>
      </section>

      <section id="editor" aria-label="Node Editor">
        <svg id="connections" aria-hidden="true"></svg>
        <div id="nodes-layer"></div>
        <div id="lasso-box" aria-hidden="true"></div>
        <div id="context-menu" class="context-menu" role="menu" aria-label="右鍵選單">
          <button type="button" data-action="add-node" role="menuitem">新增節點</button>
          <button type="button" data-action="copy" role="menuitem">複製</button>
          <button type="button" data-action="cut" role="menuitem">剪下</button>
          <button type="button" data-action="paste" role="menuitem">貼上</button>
          <button type="button" data-action="duplicate" role="menuitem">複製一份</button>
          <button type="button" data-action="edit-json" role="menuitem">編輯JSON</button>
          <button type="button" data-action="define-node" role="menuitem">定義結點</button>
          <button type="button" data-action="delete" role="menuitem">刪除</button>
          <button type="button" data-action="select-all" role="menuitem">全選</button>
          <button type="button" data-action="fit-view" role="menuitem">聚焦內容</button>
          <button type="button" data-action="undo" role="menuitem">復原</button>
          <button type="button" data-action="redo" role="menuitem">重做</button>
        </div>
        <button id="line-delete-btn" class="line-delete-btn" type="button" aria-label="刪除連線">×</button>
        <aside id="navigator" aria-label="白板導覽小地圖">
          <svg id="navigator-map" aria-hidden="true"></svg>
          <div id="navigator-view"></div>
        </aside>
      </section>
    </main>

    <template id="node-template">
      <article class="node" data-node-id="">
        <button class="node-delete-btn" type="button" aria-label="刪除節點">×</button>
        <div class="node-title">節點</div>
        <div class="node-content">拖曳節點或拉線連接</div>
      </article>
    </template>

  <script src="./app.js?v=20260324-4" defer></script>
  </body>
</html>
